<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codenprofit | Authentication</title>
    
    <!-- Tailwind CSS -->
    <link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <!-- Firebase Config -->
    <script src="firebase-config.js"></script>
    
    <style>
        :root {
            --primary-dark: #17252A;
            --surface-teal: #2B7A78;
            --accent-teal: #3AAFA9;
            --soft-ice: #DEF2F1;
            --pure-white: #FEFFFF;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--primary-dark) 0%, #1a3a3a 100%);
            color: var(--pure-white);
            min-height: 100vh;
        }
        
        .glass-effect {
            background: rgba(43, 122, 120, 0.25);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(58, 175, 169, 0.25);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        
        .gradient-accent {
            background: linear-gradient(135deg, var(--accent-teal) 0%, var(--surface-teal) 100%);
        }
        
        .text-accent-teal { color: var(--accent-teal); }
        .text-soft-ice { color: var(--soft-ice); }
        
        .form-input {
            background: rgba(43, 122, 120, 0.2);
            border: 1px solid rgba(58, 175, 169, 0.3);
            color: var(--pure-white);
            transition: all 0.3s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--accent-teal);
            box-shadow: 0 0 0 3px rgba(58, 175, 169, 0.2);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-teal) 0%, var(--surface-teal) 100%);
            color: var(--primary-dark);
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(58, 175, 169, 0.4);
        }
        
        .btn-outline {
            border: 2px solid var(--accent-teal);
            color: var(--accent-teal);
            background: transparent;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-outline:hover {
            background: rgba(58, 175, 169, 0.1);
            transform: translateY(-2px);
        }
        
        .account-type-btn.active {
            background: linear-gradient(135deg, var(--accent-teal) 0%, var(--surface-teal) 100%);
            color: var(--primary-dark);
        }
        
        .account-type-btn:not(.active) {
            background: rgba(43, 122, 120, 0.2);
            color: var(--soft-ice);
            border: 1px solid rgba(58, 175, 169, 0.3);
        }
        
        .notification {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 1000;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            max-width: 380px;
        }
        
        .notification.show {
            transform: translateX(0);
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(23, 37, 42, 0.95);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
        }
        
        .loading-overlay.hidden {
            display: none;
        }
        
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(58, 175, 169, 0.2);
            border-radius: 50%;
            border-top-color: var(--accent-teal);
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 24px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="loading-spinner"></div>
        <p class="text-accent-teal text-lg font-semibold" id="loading-message">Processing...</p>
    </div>
    
    <!-- Notification -->
    <div id="notification" class="notification glass-effect rounded-xl p-4 shadow-2xl">
        <div class="flex items-start">
            <div id="notification-icon" class="w-10 h-10 rounded-full flex-shrink-0 flex items-center justify-center mr-4">
                <i class="fas fa-check"></i>
            </div>
            <div class="flex-grow">
                <p class="font-bold text-lg mb-1" id="notification-title">Success!</p>
                <p class="text-sm text-soft-ice opacity-90" id="notification-message"></p>
            </div>
            <button onclick="hideNotification()" class="text-soft-ice hover:text-accent-teal ml-2">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </div>
    
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-10">
            <div class="flex items-center justify-center space-x-2 mb-4">
                <div class="w-14 h-14 rounded-full gradient-accent flex items-center justify-center shadow-lg">
                    <span class="font-bold text-primary-dark text-2xl">C</span>
                </div>
                <span class="text-3xl font-bold text-accent-teal tracking-wider">CODENPROFIT</span>
            </div>
            <p class="text-soft-ice text-lg">Turn Code Into Commercial Capital</p>
        </div>
        
        <!-- Auth Container -->
        <div class="glass-effect rounded-2xl p-8">
            <!-- Login Container -->
            <div id="login-container">
                <h2 class="text-3xl font-bold mb-8 text-center text-accent-teal">Welcome Back</h2>
                
                <form id="login-form" class="space-y-6">
                    <div>
                        <label for="login-email" class="block text-soft-ice mb-2 text-sm font-medium">Email Address</label>
                        <input 
                            type="email" 
                            id="login-email" 
                            required 
                            autocomplete="email"
                            class="w-full px-4 py-3 rounded-lg form-input"
                            placeholder="name@company.com"
                        >
                    </div>
                    
                    <div>
                        <label for="login-password" class="block text-soft-ice mb-2 text-sm font-medium">Password</label>
                        <input 
                            type="password" 
                            id="login-password" 
                            required 
                            autocomplete="current-password"
                            class="w-full px-4 py-3 rounded-lg form-input"
                            placeholder="••••••••"
                        >
                    </div>
                    
                    <div class="flex items-center justify-between">
                        <label class="flex items-center space-x-2">
                            <input type="checkbox" id="remember-me" class="accent-accent-teal">
                            <span class="text-sm text-soft-ice">Remember me</span>
                        </label>
                        <button type="button" onclick="showForgotPassword()" class="text-sm text-accent-teal hover:underline">
                            Forgot password?
                        </button>
                    </div>
                    
                    <button type="submit" class="w-full py-3.5 rounded-lg btn-primary font-semibold">
                        Sign In
                    </button>
                    
                    <p class="text-center text-soft-ice mt-6">
                        Don't have an account? 
                        <button type="button" onclick="showSignup()" class="text-accent-teal hover:underline ml-1 font-semibold">
                            Sign up
                        </button>
                    </p>
                </form>
            </div>
            
            <!-- Signup Container -->
            <div id="signup-container" class="hidden">
                <h2 class="text-3xl font-bold mb-8 text-center text-accent-teal">Join the Movement</h2>
                
                <form id="signup-form" class="space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label for="signup-firstname" class="block text-soft-ice mb-2 text-sm font-medium">First Name</label>
                            <input 
                                type="text" 
                                id="signup-firstname" 
                                required 
                                autocomplete="given-name"
                                class="w-full px-4 py-3 rounded-lg form-input"
                                placeholder="John"
                            >
                        </div>
                        <div>
                            <label for="signup-lastname" class="block text-soft-ice mb-2 text-sm font-medium">Last Name</label>
                            <input 
                                type="text" 
                                id="signup-lastname" 
                                required 
                                autocomplete="family-name"
                                class="w-full px-4 py-3 rounded-lg form-input"
                                placeholder="Doe"
                            >
                        </div>
                    </div>
                    
                    <div>
                        <label for="signup-email" class="block text-soft-ice mb-2 text-sm font-medium">Email Address</label>
                        <input 
                            type="email" 
                            id="signup-email" 
                            required 
                            autocomplete="email"
                            class="w-full px-4 py-3 rounded-lg form-input"
                            placeholder="name@company.com"
                        >
                    </div>
                    
                    <div>
                        <label for="signup-password" class="block text-soft-ice mb-2 text-sm font-medium">Password</label>
                        <input 
                            type="password" 
                            id="signup-password" 
                            required 
                            autocomplete="new-password"
                            class="w-full px-4 py-3 rounded-lg form-input"
                            placeholder="Create a password"
                        >
                        <p class="text-xs text-soft-ice mt-2">Minimum 8 characters</p>
                    </div>
                    
                    <div>
                        <p class="text-soft-ice mb-3 text-sm font-medium">I am a:</p>
                        <div class="grid grid-cols-2 gap-4">
                            <button type="button" id="host-btn" 
                                    class="py-3 rounded-lg account-type-btn active"
                                    onclick="selectAccountType('host')">
                                Business Host
                            </button>
                            <button type="button" id="dev-btn" 
                                    class="py-3 rounded-lg account-type-btn"
                                    onclick="selectAccountType('developer')">
                                Developer
                            </button>
                        </div>
                    </div>
                    
                    <div class="flex items-start space-x-3">
                        <input type="checkbox" id="terms" required class="accent-accent-teal mt-1">
                        <label for="terms" class="text-sm text-soft-ice">
                            I agree to the <a href="#" onclick="showTerms()" class="text-accent-teal hover:underline">Terms of Service</a> and <a href="#" onclick="showPrivacy()" class="text-accent-teal hover:underline">Privacy Policy</a>
                        </label>
                    </div>
                    
                    <button type="submit" class="w-full py-3.5 rounded-lg btn-primary font-semibold">
                        Create Account
                    </button>
                    
                    <p class="text-center text-soft-ice mt-6">
                        Already have an account? 
                        <button type="button" onclick="showLogin()" class="text-accent-teal hover:underline ml-1 font-semibold">
                            Sign in
                        </button>
                    </p>
                </form>
            </div>
            
            <!-- Forgot Password Container -->
            <div id="forgot-password-container" class="hidden">
                <h2 class="text-3xl font-bold mb-8 text-center text-accent-teal">Reset Password</h2>
                
                <form id="forgot-password-form" class="space-y-6">
                    <div>
                        <label for="reset-email" class="block text-soft-ice mb-2 text-sm font-medium">Email Address</label>
                        <input 
                            type="email" 
                            id="reset-email" 
                            required 
                            autocomplete="email"
                            class="w-full px-4 py-3 rounded-lg form-input"
                            placeholder="name@company.com"
                        >
                    </div>
                    
                    <button type="submit" class="w-full py-3.5 rounded-lg btn-primary font-semibold">
                        Send Reset Link
                    </button>
                    
                    <button type="button" onclick="showLogin()" 
                            class="w-full py-3.5 rounded-lg btn-outline font-semibold">
                        Back to Login
                    </button>
                </form>
            </div>
        </div>
        
        <!-- Back to home -->
        <div class="text-center mt-8">
            <a href="index.html" class="text-soft-ice hover:text-accent-teal transition-all inline-flex items-center space-x-2">
                <i class="fas fa-arrow-left"></i>
                <span>Back to Home</span>
            </a>
        </div>
    </div>

    <script>
        // Global Variables
        let selectedAccountType = 'host';
        let isDemoMode = false;
        
        // DOM Elements
        const loginContainer = document.getElementById('login-container');
        const signupContainer = document.getElementById('signup-container');
        const forgotPasswordContainer = document.getElementById('forgot-password-container');
        const loadingOverlay = document.getElementById('loading-overlay');
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            // Check Firebase
            if (typeof FirebaseService === 'undefined' || !window.firebaseInitialized) {
                console.log('Using demo mode');
                isDemoMode = true;
            }
            
            // Check URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const action = urlParams.get('action');
            const type = urlParams.get('type');
            
            if (type) {
                selectAccountType(type);
            }
            
            if (action === 'signup') {
                showSignup();
            } else {
                showLogin();
            }
            
            // Check if already logged in
            checkAuthState();
            
            // Setup form handlers
            document.getElementById('login-form').addEventListener('submit', handleLogin);
            document.getElementById('signup-form').addEventListener('submit', handleSignup);
            document.getElementById('forgot-password-form').addEventListener('submit', handleForgotPassword);
        });
        
        // Check Auth State
        function checkAuthState() {
            if (!isDemoMode && FirebaseService && FirebaseService.getAuth()) {
                const auth = FirebaseService.getAuth();
                auth.onAuthStateChanged(async (user) => {
                    if (user) {
                        showLoading('Redirecting...');
                        await redirectToDashboard(user);
                    }
                });
            } else {
                // Check demo user in localStorage
                const demoUser = localStorage.getItem('demo_user');
                if (demoUser) {
                    const user = JSON.parse(demoUser);
                    if (user.userType === 'developer') {
                        window.location.href = 'dev.html';
                    } else if (user.userType === 'host') {
                        window.location.href = 'host.html';
                    }
                }
            }
        }
        
        // Redirect to Dashboard
        async function redirectToDashboard(user) {
            try {
                if (!isDemoMode && FirebaseService) {
                    const result = await FirebaseService.getUserType(user.uid);
                    
                    if (result.success) {
                        if (result.type === 'developer') {
                            window.location.href = 'dev.html';
                        } else if (result.type === 'host') {
                            window.location.href = 'host.html';
                        }
                    } else {
                        // New user - stay on auth page
                        hideLoading();
                    }
                }
            } catch (error) {
                console.error('Redirect error:', error);
                hideLoading();
            }
        }
        
        // Show/Hide Containers
        function showLogin() {
            loginContainer.classList.remove('hidden');
            signupContainer.classList.add('hidden');
            forgotPasswordContainer.classList.add('hidden');
        }
        
        function showSignup() {
            loginContainer.classList.add('hidden');
            signupContainer.classList.remove('hidden');
            forgotPasswordContainer.classList.add('hidden');
        }
        
        function showForgotPassword() {
            loginContainer.classList.add('hidden');
            signupContainer.classList.add('hidden');
            forgotPasswordContainer.classList.remove('hidden');
        }
        
        function selectAccountType(type) {
            selectedAccountType = type;
            
            document.getElementById('host-btn').classList.toggle('active', type === 'host');
            document.getElementById('dev-btn').classList.toggle('active', type === 'developer');
        }
        
        // Handle Login
        async function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const rememberMe = document.getElementById('remember-me').checked;
            
            if (!email || !password) {
                showNotification('Error', 'Please fill all fields', 'error');
                return;
            }
            
            showLoading('Signing in...');
            
            if (isDemoMode) {
                // Demo mode login
                setTimeout(() => {
                    const demoUser = {
                        uid: 'demo_' + Date.now(),
                        email: email,
                        displayName: email.split('@')[0],
                        userType: selectedAccountType
                    };
                    localStorage.setItem('demo_user', JSON.stringify(demoUser));
                    
                    if (rememberMe) {
                        localStorage.setItem('remembered_email', email);
                    }
                    
                    showNotification('Success', 'Demo login successful!', 'success');
                    
                    setTimeout(() => {
                        if (selectedAccountType === 'developer') {
                            window.location.href = 'dev.html';
                        } else {
                            window.location.href = 'host.html';
                        }
                    }, 1000);
                }, 1000);
                return;
            }
            
            try {
                const result = await FirebaseService.signIn(email, password);
                
                if (result.success) {
                    showNotification('Success', 'Login successful!', 'success');
                    
                    if (rememberMe) {
                        localStorage.setItem('remembered_email', email);
                    }
                    
                    // Get user type and redirect
                    const typeResult = await FirebaseService.getUserType(result.user.uid);
                    
                    setTimeout(() => {
                        if (typeResult.success) {
                            if (typeResult.type === 'developer') {
                                window.location.href = 'dev.html';
                            } else {
                                window.location.href = 'host.html';
                            }
                        }
                    }, 1000);
                } else {
                    hideLoading();
                    showNotification('Error', result.error || 'Invalid credentials', 'error');
                }
            } catch (error) {
                hideLoading();
                showNotification('Error', 'Login failed', 'error');
            }
        }
        
        // Handle Signup
        async function handleSignup(e) {
            e.preventDefault();
            
            const firstName = document.getElementById('signup-firstname').value.trim();
            const lastName = document.getElementById('signup-lastname').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value;
            const terms = document.getElementById('terms').checked;
            
            if (!firstName || !lastName || !email || !password) {
                showNotification('Error', 'Please fill all fields', 'error');
                return;
            }
            
            if (!terms) {
                showNotification('Error', 'Please agree to the terms', 'error');
                return;
            }
            
            if (password.length < 8) {
                showNotification('Error', 'Password must be at least 8 characters', 'error');
                return;
            }
            
            showLoading('Creating account...');
            
            if (isDemoMode) {
                setTimeout(() => {
                    const demoUser = {
                        uid: 'demo_' + Date.now(),
                        email: email,
                        displayName: `${firstName} ${lastName}`,
                        firstName: firstName,
                        lastName: lastName,
                        userType: selectedAccountType,
                        onboardingComplete: false
                    };
                    localStorage.setItem('demo_user', JSON.stringify(demoUser));
                    
                    showNotification('Success', 'Account created! (Demo Mode)', 'success');
                    
                    setTimeout(() => {
                        if (selectedAccountType === 'developer') {
                            window.location.href = 'dev.html';
                        } else {
                            window.location.href = 'host.html';
                        }
                    }, 1000);
                }, 1500);
                return;
            }
            
            try {
                const userData = {
                    displayName: `${firstName} ${lastName}`,
                    firstName,
                    lastName,
                    email,
                    userType: selectedAccountType
                };
                
                const result = await FirebaseService.signUp(email, password, userData);
                
                if (result.success) {
                    showNotification('Success', 'Account created!', 'success');
                    
                    setTimeout(() => {
                        if (selectedAccountType === 'developer') {
                            window.location.href = 'dev.html';
                        } else {
                            window.location.href = 'host.html';
                        }
                    }, 1500);
                } else {
                    hideLoading();
                    showNotification('Error', result.error, 'error');
                }
            } catch (error) {
                hideLoading();
                showNotification('Error', 'Signup failed', 'error');
            }
        }
        
        // Handle Forgot Password
        async function handleForgotPassword(e) {
            e.preventDefault();
            
            const email = document.getElementById('reset-email').value.trim();
            
            if (!email) {
                showNotification('Error', 'Please enter your email', 'error');
                return;
            }
            
            showLoading('Sending reset link...');
            
            if (isDemoMode) {
                setTimeout(() => {
                    hideLoading();
                    showNotification('Success', 'Reset email sent! (Demo Mode)', 'success');
                    setTimeout(showLogin, 2000);
                }, 1500);
                return;
            }
            
            try {
                const auth = FirebaseService.getAuth();
                await auth.sendPasswordResetEmail(email);
                
                hideLoading();
                showNotification('Success', 'Reset email sent!', 'success');
                setTimeout(showLogin, 2000);
            } catch (error) {
                hideLoading();
                showNotification('Error', error.message, 'error');
            }
        }
        
        // Utility Functions
        function showLoading(message = 'Processing...') {
            document.getElementById('loading-message').textContent = message;
            loadingOverlay.classList.remove('hidden');
        }
        
        function hideLoading() {
            loadingOverlay.classList.add('hidden');
        }
        
        function showNotification(title, message, type = 'success') {
            const notification = document.getElementById('notification');
            const icon = document.getElementById('notification-icon');
            
            icon.className = 'w-10 h-10 rounded-full flex-shrink-0 flex items-center justify-center mr-4';
            
            switch(type) {
                case 'success':
                    icon.className += ' bg-green-500/20';
                    icon.innerHTML = '<i class="fas fa-check text-green-500 text-xl"></i>';
                    break;
                case 'error':
                    icon.className += ' bg-red-500/20';
                    icon.innerHTML = '<i class="fas fa-exclamation-circle text-red-500 text-xl"></i>';
                    break;
                case 'info':
                    icon.className += ' bg-blue-500/20';
                    icon.innerHTML = '<i class="fas fa-info-circle text-blue-500 text-xl"></i>';
                    break;
            }
            
            document.getElementById('notification-title').textContent = title;
            document.getElementById('notification-message').textContent = message;
            
            notification.classList.add('show');
            
            setTimeout(hideNotification, 4000);
        }
        
        function hideNotification() {
            document.getElementById('notification').classList.remove('show');
        }
        
        function showTerms() {
            showNotification('Terms', 'Terms would be displayed here', 'info');
        }
        
        function showPrivacy() {
            showNotification('Privacy', 'Privacy policy would be displayed here', 'info');
        }
        
        // Load remembered email
        const remembered = localStorage.getItem('remembered_email');
        if (remembered) {
            document.getElementById('login-email').value = remembered;
            document.getElementById('remember-me').checked = true;
        }
    </script>
</body>
</html>
